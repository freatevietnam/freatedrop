{% extends 'base.html' %}
{% load static %}

{% block title %}Register · Freate Drop{% endblock %}

{% block content %}
<section class="mx-auto max-w-xl rounded-lg border border-zinc-200 bg-white p-6">
    <h1 class="text-3xl font-semibold tracking-tight">Create account</h1>
    <p class="mt-2 text-sm text-zinc-600">Register to keep your drops organized in a personal dashboard.</p>

    <div id="auth-status" class="mt-4 hidden rounded border px-4 py-3 text-sm"></div>

    <form id="register-form" method="post" action="/api/auth/register/" class="mt-6 space-y-4">
        {% csrf_token %}
        <div>
            <label for="username" class="block text-sm font-medium text-zinc-700">Username</label>
            <input id="username" name="username" type="text" class="mt-1 w-full rounded border border-zinc-300 px-3 py-2 outline-none focus:border-zinc-900" required>
        </div>
        <div>
            <label for="email" class="block text-sm font-medium text-zinc-700">Email</label>
            <input id="email" name="email" type="email" class="mt-1 w-full rounded border border-zinc-300 px-3 py-2 outline-none focus:border-zinc-900" required>
        </div>
        <div>
            <label for="password" class="block text-sm font-medium text-zinc-700">Password</label>
            <input id="password" name="password" type="password" class="mt-1 w-full rounded border border-zinc-300 px-3 py-2 outline-none focus:border-zinc-900" required>
        </div>
        <div>
            <label for="confirm_password" class="block text-sm font-medium text-zinc-700">Confirm password</label>
            <input id="confirm_password" name="confirm_password" type="password" class="mt-1 w-full rounded border border-zinc-300 px-3 py-2 outline-none focus:border-zinc-900" required>
        </div>
        <button type="submit" class="w-full rounded bg-zinc-900 px-4 py-2 text-white hover:bg-zinc-700">Register</button>
    </form>
</section>
{% endblock %}

{% block scripts %}
<script src="{% static 'js/auth.js' %}"></script>
<script>
    window.FREATE_DROP_AUTH = { mode: 'register' };
</script>
{% endblock %}
