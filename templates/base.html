{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Freate Drop{% endblock %}</title>
    <meta name="description" content="Freate Drop is a lightweight platform for sharing Markdown drops without requiring login.">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/styles/github-dark.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.css">
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
            }
        };
    </script>
    <style>
        .markdown-body {
            color: rgb(24 24 27);
            line-height: 1.75;
            word-break: break-word;
        }

        .markdown-body > * + * {
            margin-top: 1rem;
        }

        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3,
        .markdown-body h4,
        .markdown-body h5,
        .markdown-body h6 {
            font-weight: 600;
            letter-spacing: -0.02em;
            color: rgb(9 9 11);
            margin-top: 1.75rem;
            margin-bottom: 0.75rem;
        }

        .markdown-body h1 {
            font-size: 2.25rem;
            line-height: 1.1;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid rgb(228 228 231);
        }

        .markdown-body h2 {
            font-size: 1.75rem;
            line-height: 1.2;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgb(228 228 231);
        }

        .markdown-body h3 {
            font-size: 1.375rem;
            line-height: 1.3;
        }

        .markdown-body h4 {
            font-size: 1.125rem;
        }

        .markdown-body h5,
        .markdown-body h6 {
            font-size: 1rem;
        }

        .markdown-body p,
        .markdown-body ul,
        .markdown-body ol,
        .markdown-body blockquote,
        .markdown-body table,
        .markdown-body pre,
        .markdown-body dl {
            margin-top: 1rem;
            margin-bottom: 1rem;
        }

        .markdown-body a {
            color: rgb(37 99 235);
            text-decoration: underline;
            text-underline-offset: 0.18em;
        }

        .markdown-body a:hover {
            color: rgb(29 78 216);
        }

        .markdown-body strong {
            font-weight: 700;
            color: rgb(9 9 11);
        }

        .markdown-body em {
            font-style: italic;
        }

        .markdown-body del {
            color: rgb(113 113 122);
        }

        .markdown-body hr {
            border: 0;
            border-top: 1px solid rgb(228 228 231);
            margin: 2rem 0;
        }

        .markdown-body ul,
        .markdown-body ol {
            padding-left: 1.5rem;
        }

        .markdown-body ul {
            list-style: disc;
        }

        .markdown-body ol {
            list-style: decimal;
        }

        .markdown-body li + li {
            margin-top: 0.35rem;
        }

        .markdown-body li > ul,
        .markdown-body li > ol {
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .markdown-body input[type="checkbox"] {
            margin-right: 0.5rem;
            transform: translateY(1px);
        }

        .markdown-body blockquote {
            border-left: 4px solid rgb(212 212 216);
            padding: 0.25rem 0 0.25rem 1rem;
            color: rgb(82 82 91);
            background: rgb(250 250 250);
        }

        .markdown-body code {
            font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 0.875em;
            background: rgb(244 244 245);
            color: rgb(24 24 27);
            padding: 0.15rem 0.35rem;
            border-radius: 0.375rem;
        }

        .markdown-body pre {
            background: rgb(9 9 11);
            color: rgb(244 244 245);
            padding: 1rem;
            border-radius: 0 0 0.75rem 0.75rem;
            overflow-x: auto;
            border: 0;
            margin: 0;
        }

        .markdown-body .code-block {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
            background: #0d1117;
            border-color: #30363d;
        }

        .markdown-body .code-block-header {
            background: #161b22;
            border-bottom-color: #30363d;
        }

        .markdown-body .code-block-language {
            color: #c9d1d9;
        }

        .markdown-body .code-copy-button {
            border-color: #30363d;
            background: transparent;
            color: #c9d1d9;
        }

        .markdown-body .code-copy-button:hover {
            border-color: #8b949e;
            background: #21262d;
        }

        .markdown-body .code-block + .code-block {
            margin-top: 1rem;
        }

        .markdown-body pre code {
            background: transparent;
            color: inherit;
            padding: 0;
            border-radius: 0;
            font-size: 0.95rem;
            font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }

        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            display: block;
            overflow-x: auto;
        }

        .markdown-body thead {
            background: rgb(244 244 245);
        }

        .markdown-body th,
        .markdown-body td {
            border: 1px solid rgb(228 228 231);
            padding: 0.75rem 0.9rem;
            text-align: left;
            vertical-align: top;
        }

        .markdown-body th {
            font-weight: 600;
            color: rgb(9 9 11);
        }

        .markdown-body img {
            max-width: 100%;
            height: auto;
            border-radius: 0.75rem;
            border: 1px solid rgb(228 228 231);
        }

        .markdown-body kbd {
            font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 0.85em;
            border: 1px solid rgb(212 212 216);
            border-bottom-width: 2px;
            border-radius: 0.375rem;
            padding: 0.1rem 0.35rem;
            background: white;
        }

        .markdown-body .footnotes {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid rgb(228 228 231);
            font-size: 0.95rem;
            color: rgb(63 63 70);
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="min-h-screen bg-zinc-50 text-zinc-900">
    <div class="mx-auto flex min-h-screen max-w-6xl flex-col px-4 py-6 sm:px-6 lg:px-8">
        <header class="mb-10 border-b border-zinc-200 pb-4">
            <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
                <a href="/" class="text-xl font-semibold tracking-tight">Freate Drop</a>
                <nav class="flex flex-wrap items-center gap-3 text-sm">
                    <a href="/" class="rounded border border-zinc-300 px-3 py-2 hover:bg-zinc-100">Home</a>
                    <a href="/new/" class="rounded bg-zinc-900 px-3 py-2 text-white hover:bg-zinc-700">Create New Drop</a>
                    {% if request.user.is_authenticated %}
                        <a href="/dashboard/" class="rounded border border-zinc-300 px-3 py-2 hover:bg-zinc-100">Dashboard</a>
                        <form action="/logout/" method="post" class="inline">
                            {% csrf_token %}
                            <button type="submit" class="rounded border border-zinc-300 px-3 py-2 hover:bg-zinc-100">Logout</button>
                        </form>
                    {% else %}
                        <a href="/login/" class="rounded border border-zinc-300 px-3 py-2 hover:bg-zinc-100">Login</a>
                        <a href="/register/" class="rounded border border-zinc-300 px-3 py-2 hover:bg-zinc-100">Register</a>
                    {% endif %}
                </nav>
            </div>
        </header>

        <main class="flex-1">
            {% block content %}{% endblock %}
        </main>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@18.0.5/lib/marked.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/delphi.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/contrib/auto-render.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js"></script>
    <script src="{% static 'js/app.js' %}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
